name: meplayer
description: A simple, privacy first media viewer.
version: 1.0.6
repository: https://github.com/JaMes-pong/meplayer

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_windows_video: ^1.0.11
  file_picker: ^10.3.10
  window_manager: ^0.5.1
  fc_native_video_thumbnail: ^0.17.2
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

flutter: 
  uses-material-design: true
